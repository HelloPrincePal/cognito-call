<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Cognito Call</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 360px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #ffffff;
            color: #111827;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 440px;
            border-radius: 16px;
        }

        /* Icons */
        .icon {
            display: inline-block;
            vertical-align: middle;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background-color: #ffffff;
            flex-shrink: 0;
        }

        .brand-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 36px;
            height: 36px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .brand-text h1 {
            font-size: 16px;
            font-weight: 600;
            color: #171717;
            letter-spacing: -0.2px;
            line-height: 1.2;
        }

        .brand-text p {
            font-size: 12px;
            color: #6b7280;
            font-weight: 400;
            line-height: 1.2;
        }

        .rec-badge {
            background: #fef2f2;
            color: #dc2626;
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            display: none;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.5px;
        }

        .rec-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
        }

        .divider {
            height: 1px;
            background-color: #f3f4f6;
            width: 100%;
            flex-shrink: 0;
        }

        /* Main Content */
        .content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            background-color: #ffffff;
        }

        /* State Views */
        #idle-view, #recording-view {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #recording-view {
            display: none;
        }

        /* Idle Specifics */
        .icon-circle {
            width: 64px;
            height: 64px;
            background: #f0f4ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #335cff;
        }

        .ready-title {
            font-size: 20px;
            font-weight: 600;
            color: #171717;
            letter-spacing: -0.3px;
        }

        .ready-desc {
            font-size: 13px;
            line-height: 1.5;
            color: #6b7280;
            max-width: 100%;
            text-align: center;
        }

        /* Recording Specifics */
        .pulse-container {
            width: 72px;
            height: 72px;
            background: #fef2f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pulse-inner {
            width: 52px;
            height: 52px;
            background: #fee2e2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse-ring 2s infinite;
        }

        .pulse-dot {
            width: 12px;
            height: 12px;
            background: #ef4444;
            border-radius: 50%;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        .recording-title {
            font-size: 20px;
            font-weight: 600;
            color: #171717;
            letter-spacing: -0.3px;
        }

        #timer {
            font-size: 40px;
            font-weight: 700;
            color: #171717;
            letter-spacing: -1px;
            font-variant-numeric: tabular-nums;
        }

        .capturing-text {
            font-size: 13px;
            color: #6b7280;
        }

        /* Buttons */
        .btn {
            width: 100%;
            height: 48px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        #startBtn {
            background: #335cff;
            color: white;
        }

        #startBtn:hover { background: #2547d0; }
        #startBtn:disabled { background: #9ca3af; cursor: not-allowed; }

        #stopBtn {
            background: #ef4444;
            color: white;
        }

        #stopBtn:hover { background: #dc2626; }

        /* Badges */
        .info-badges {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-local {
            background: #f0fdf4;
            color: #15803d;
        }

        .badge-cloud {
            background: #faf5ff;
            color: #7e22ce;
        }

        #status {
            padding: 0 24px 16px;
            font-size: 12px;
            text-align: center;
            color: #6b7280;
            min-height: 20px;
            background-color: #ffffff;
        }
        
        #status.success { color: #15803d; }
        #status.error { color: #dc2626; }
    </style>
</head>

<body>
    <header class="header">
        <div class="brand-info">
            <img src="../icons/icon48.png" alt="Logo" class="logo">
            <div class="brand-text">
                <h1>Cognito Call</h1>
                <p>Local Tab Recorder</p>
            </div>
        </div>
        <div id="rec-badge" class="rec-badge">
            <div class="rec-dot"></div>
            REC
        </div>
    </header>

    <div class="divider"></div>

    <main class="content">
        <!-- Idle State -->
        <div id="idle-view">
            <div class="icon-circle">
                <svg class="icon" width="28" height="28" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </div>
            <h2 class="ready-title">Ready to Record</h2>
            <p class="ready-desc">Capture this tab's audio, video, and your microphone, all saved locally.</p>
            <button id="startBtn" class="btn">
                <svg class="icon" width="16" height="16" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle></svg>
                <span id="startBtnLabel">Start Recording</span>
            </button>
            <div class="info-badges">
                <div class="badge badge-local">
                    <svg class="icon" width="12" height="12" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 1 1 10 0v4"></path></svg>
                    100% Local
                </div>
                <div class="badge badge-cloud">
                    <svg class="icon" width="12" height="12" viewBox="0 0 24 24"><path d="M17.58 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path><line x1="2" y1="2" x2="22" y2="22"></line></svg>
                    No Cloud
                </div>
            </div>
        </div>

        <!-- Recording State -->
        <div id="recording-view">
            <div class="pulse-container">
                <div class="pulse-inner">
                    <div class="pulse-dot"></div>
                </div>
            </div>
            <h2 class="recording-title">Recording in Progress</h2>
            <div id="timer">00:00</div>
            <p class="capturing-text">Capturing tab audio + microphone</p>
            <button id="stopBtn" class="btn">
                <svg class="icon" width="16" height="16" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                Stop Recording
            </button>
            <div class="info-badges">
                <div class="badge badge-local">
                    <svg class="icon" width="12" height="12" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 1 1 10 0v4"></path></svg>
                    100% Local
                </div>
                <div class="badge badge-cloud">
                    <svg class="icon" width="12" height="12" viewBox="0 0 24 24"><path d="M17.58 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path><line x1="2" y1="2" x2="22" y2="22"></line></svg>
                    No Cloud
                </div>
            </div>
        </div>
    </main>

    <div id="status"></div>

    <script src="index.js"></script>
</body>

</html>
