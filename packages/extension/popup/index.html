<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Cognito Call</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 360px;
            min-height: 440px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #ffffff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-radius: 16px;
        }

        /* Icons base */
        .icon {
            display: inline-block;
            vertical-align: middle;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ============================================
           Header (DcHXc / 4d8fH): padding:[16,20], gap:12
           ============================================ */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            flex-shrink: 0;
        }

        .brand-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 36px;
            height: 36px;
            object-fit: contain;
            flex-shrink: 0;
        }

        /* Brand text (pR3y6 / ccJtL): gap:2 */
        .brand-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .brand-text h1 {
            font-size: 16px;
            font-weight: 600;
            color: #171717;
            letter-spacing: -0.2px;
            line-height: 1.2;
        }

        .brand-text p {
            font-size: 12px;
            color: #6b7280;
            font-weight: 400;
            line-height: 1.2;
        }

        /* REC Badge (FtWW0): padding:[6,12], radius:100, gap:6, fill:#fef2f2 */
        .rec-badge {
            background: #fef2f2;
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            color: #dc2626;
            letter-spacing: 0.5px;
            display: none;
            align-items: center;
            gap: 6px;
        }

        .rec-dot {
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
        }

        /* Divider (bYYpz / LvpNX): height:1, fill:#f3f4f6 */
        .divider {
            height: 1px;
            background-color: #f3f4f6;
            width: 100%;
            flex-shrink: 0;
        }

        /* ============================================
           Body (ZGc3w / 8Kuws): padding:24, gap:20,
           layout:vertical, height:fill_container
           ============================================ */
        .content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        /* State views — gap:20 matches Body gap */
        #idle-view, #recording-view {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #recording-view {
            display: none;
        }

        /* ============================================
           Idle State elements
           ============================================ */

        /* Status Icon Container (sGruk): 64x64, radius:32, fill:#f0f4ff */
        .icon-circle {
            width: 64px;
            height: 64px;
            background: #f0f4ff;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #335cff;
        }

        /* statusTitle (GHJap): fontSize:20, fontWeight:600, letterSpacing:-0.3 */
        .ready-title {
            font-size: 20px;
            font-weight: 600;
            color: #171717;
            letter-spacing: -0.3px;
            text-align: center;
        }

        /* statusDesc (tGHmO): fontSize:13, lineHeight:1.5, color:#6b7280 */
        .ready-desc {
            font-size: 13px;
            line-height: 1.5;
            color: #6b7280;
            width: 100%;
            text-align: center;
        }

        /* ============================================
           Recording State elements
           ============================================ */

        /* Recording Pulse (C7c7V): 72x72, radius:36, fill:#fef2f2 */
        .pulse-container {
            width: 72px;
            height: 72px;
            background: #fef2f2;
            border-radius: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Inner Circle (tGlRh): 52x52, radius:26, fill:#fee2e2 */
        .pulse-inner {
            width: 52px;
            height: 52px;
            background: #fee2e2;
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse-ring 2s infinite;
        }

        /* Red Dot (eUJ9c): 20x20, fill:#ef4444 */
        .pulse-dot {
            width: 20px;
            height: 20px;
            background: #ef4444;
            border-radius: 50%;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }

        /* recTitle (Oip5y): fontSize:20, fontWeight:600, letterSpacing:-0.3 */
        .recording-title {
            font-size: 20px;
            font-weight: 600;
            color: #171717;
            letter-spacing: -0.3px;
            text-align: center;
        }

        /* timerDisplay (mqq7i): fontSize:40, fontWeight:700, letterSpacing:-1 */
        #timer {
            font-size: 40px;
            font-weight: 700;
            color: #171717;
            letter-spacing: -1px;
            font-variant-numeric: tabular-nums;
            text-align: center;
        }

        /* captureInfo (XSk5t): fontSize:13, color:#6b7280 */
        .capturing-text {
            font-size: 13px;
            color: #6b7280;
            text-align: center;
        }

        /* ============================================
           Buttons: height:48, radius:12, padding:[12,24], gap:8
           ============================================ */
        .btn {
            width: 100%;
            height: 48px;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        /* Start Button (XbLUg): fill:#335cff */
        #startBtn {
            background: #335cff;
            color: white;
        }

        #startBtn:hover { background: #2547d0; }
        #startBtn:disabled { background: #9ca3af; cursor: not-allowed; }

        /* Stop Button (hnc3x): fill:#ef4444 */
        #stopBtn {
            background: #ef4444;
            color: white;
        }

        #stopBtn:hover { background: #dc2626; }

        /* ============================================
           Info Badges (AyqIw / 6GDVV): gap:8, justify:center
           Badge: padding:[4,10], radius:100, gap:4
           ============================================ */
        .info-badges {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 500;
        }

        /* Badge Local: fill:#f0fdf4, color:#15803d */
        .badge-local {
            background: #f0fdf4;
            color: #15803d;
        }

        /* Badge Cloud: fill:#faf5ff, color:#7c3aed */
        .badge-cloud {
            background: #faf5ff;
            color: #7c3aed;
        }

        /* Status message */
        #status:empty {
            display: none;
        }

        #status {
            padding: 0 24px 16px;
            font-size: 12px;
            text-align: center;
            color: #6b7280;
        }

        #status.success { color: #15803d; }
        #status.error { color: #dc2626; }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="brand-info">
            <img src="../icons/icon48.png" alt="Logo" class="logo">
            <div class="brand-text">
                <h1>Cognito Call</h1>
                <p>Local Tab Recorder</p>
            </div>
        </div>
        <div id="rec-badge" class="rec-badge">
            <div class="rec-dot"></div>
            REC
        </div>
    </header>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Body -->
    <main class="content">
        <!-- Idle State -->
        <div id="idle-view">
            <div class="icon-circle">
                <!-- micIconNew (OLTBe): lucide mic, 28x28 -->
                <svg class="icon" width="28" height="28" viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>
            </div>
            <h2 class="ready-title">Ready to Record</h2>
            <p class="ready-desc">Capture this tab's audio, video, and your microphone, all saved locally.</p>
            <button id="startBtn" class="btn">
                <!-- recIconNew (jyhKf): lucide circle, 16x16 -->
                <svg class="icon" width="16" height="16" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle></svg>
                <span id="startBtnLabel">Start Recording</span>
            </button>
            <div class="info-badges">
                <div class="badge badge-local">
                    <!-- lockIcon1 (JAFIE): lucide lock, 12x12 -->
                    <svg class="icon" width="12" height="12" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 1 1 10 0v4"></path></svg>
                    100% Local
                </div>
                <div class="badge badge-cloud">
                    <!-- cloudIcon1 (k7UA8): lucide cloud-off, 12x12 -->
                    <svg class="icon" width="12" height="12" viewBox="0 0 24 24"><path d="M17.58 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path><line x1="2" x2="22" y1="2" y2="22"></line></svg>
                    No Cloud
                </div>
            </div>
        </div>

        <!-- Recording State -->
        <div id="recording-view">
            <div class="pulse-container">
                <div class="pulse-inner">
                    <div class="pulse-dot"></div>
                </div>
            </div>
            <h2 class="recording-title">Recording in Progress</h2>
            <div id="timer">00:00</div>
            <p class="capturing-text">Capturing tab audio + microphone</p>
            <button id="stopBtn" class="btn">
                <!-- stopIconNew (SXtc2): lucide square, 14x14 -->
                <svg class="icon" width="14" height="14" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
                Stop Recording
            </button>
            <div class="info-badges">
                <div class="badge badge-local">
                    <!-- lockIcon2 (mm5mF): lucide lock, 12x12 -->
                    <svg class="icon" width="12" height="12" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 1 1 10 0v4"></path></svg>
                    100% Local
                </div>
                <div class="badge badge-cloud">
                    <!-- cloudIcon2 (F1bT4): lucide cloud-off, 12x12 -->
                    <svg class="icon" width="12" height="12" viewBox="0 0 24 24"><path d="M17.58 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path><line x1="2" x2="22" y1="2" y2="22"></line></svg>
                    No Cloud
                </div>
            </div>
        </div>
    </main>

    <!-- Status (hidden when empty) -->
    <div id="status"></div>

    <script src="index.js"></script>
</body>

</html>
