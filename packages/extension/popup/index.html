<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }

        #startBtn {
            background: #10b981;
            color: white;
        }

        #startBtn:hover {
            background: #059669;
        }

        #startBtn:disabled {
            background: #6b7280;
            cursor: not-allowed;
        }

        #stopBtn {
            background: #ef4444;
            color: white;
            display: none;
        }

        #stopBtn:hover {
            background: #dc2626;
        }

        #status {
            margin: 12px 0;
            font-weight: 500;
            text-align: center;
        }

        #timer {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin: 16px 0;
        }
    </style>
</head>

<body>
    <h2>🎥 Cognito Call</h2>
    <p>Record any tab locally</p>

    <button id="startBtn">Start Recording</button>
    <button id="stopBtn">Stop Recording</button>

    <div id="status"></div>
    <div id="timer" style="display:none;">00:00</div>

    <script src="index.js"></script>
</body>

</html>
